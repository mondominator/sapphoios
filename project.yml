name: Sappho
options:
  bundleIdPrefix: com.sappho
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: S6WU9SVVDW

targets:
  Sappho:
    type: application
    platform: iOS
    sources:
      - Sappho
    resources:
      - Sappho/Resources
    attributes:
      DevelopmentTeam: S6WU9SVVDW
      ProvisioningStyle: Automatic
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sappho.audiobook
        INFOPLIST_FILE: Sappho/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: S6WU9SVVDW
        ENABLE_PREVIEWS: YES
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
          DEVELOPMENT_TEAM: S6WU9SVVDW
        Release:
          CODE_SIGN_IDENTITY: "Apple Development"
          DEVELOPMENT_TEAM: S6WU9SVVDW
    entitlements:
      path: Sappho/Resources/Sappho.entitlements
      properties:
        com.apple.developer.carplay-audio: true
        com.apple.security.application-groups:
          - group.com.sappho.audiobooks

  SapphoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SapphoTests
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: S6WU9SVVDW
    dependencies:
      - target: Sappho

  SapphoUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - SapphoUITests
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: S6WU9SVVDW
    dependencies:
      - target: Sappho

schemes:
  Sappho:
    build:
      targets:
        Sappho: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SapphoTests
        - SapphoUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
