name: Sappho
options:
  bundleIdPrefix: com.sappho
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

# DEVELOPMENT_TEAM is declared once here at the project level; all targets
# inherit it. CODE_SIGN_STYLE: Automatic handles identity selection, so no
# CODE_SIGN_IDENTITY overrides are needed.
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: S6WU9SVVDW

targets:
  Sappho:
    type: application
    platform: iOS
    sources:
      - Sappho
    resources:
      - Sappho/Resources
    attributes:
      ProvisioningStyle: Automatic
    settings:
      base:
        # NOTE: "audiobook" (singular) is the bundle id shipped to the App
        # Store and is IMMUTABLE — do not "fix" it to "audiobooks".
        PRODUCT_BUNDLE_IDENTIFIER: com.sappho.audiobook
        INFOPLIST_FILE: Sappho/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
    entitlements:
      path: Sappho/Resources/Sappho.entitlements
      properties:
        com.apple.developer.carplay-audio: true
        com.apple.security.application-groups:
          - group.com.sappho.audiobooks

  SapphoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SapphoTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: Sappho

  SapphoUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - SapphoUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: Sappho

schemes:
  Sappho:
    build:
      targets:
        Sappho: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SapphoTests
        - SapphoUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
