name: Sappho
options:
  bundleIdPrefix: com.sappho
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: NR8DLKJ7E6

targets:
  Sappho:
    type: application
    platform: iOS
    sources:
      - Sappho
    resources:
      - Sappho/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sappho.audiobooks
        INFOPLIST_FILE: Sappho/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
    entitlements:
      path: Sappho/Resources/Sappho.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sappho.audiobooks

  SapphoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SapphoTests
    dependencies:
      - target: Sappho

  SapphoUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - SapphoUITests
    dependencies:
      - target: Sappho

schemes:
  Sappho:
    build:
      targets:
        Sappho: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SapphoTests
        - SapphoUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
